# NES 2A03 chiptune configuration.
# Every value in this file is a taste knob. Nothing tasteful is hardcoded in Python.

sample_rate = 44100
frame_rate  = 60.0        # 2A03 frame clock; NTSC is really 60.0988

[arrange]
subdivision              = 16     # quantize onsets to 1/16 notes
quantize_strength        = 0.85   # 1.0 snaps hard and kills groove; 0.0 is a no-op
min_duration             = 0.03   # seconds; floor so quantization can't zero a note
arpeggio_frames          = 2      # frames per chord tone; lower = smoother fusion, higher = audible cycling
bass_low                 = 28     # MIDI E1; fold bass below this up an octave
bass_high                = 55     # MIDI G3; fold bass above this down an octave
borrow_enabled           = false  # Phase 4 feature; role-locked until then
borrow_idle_frames       = 30     # channel must be idle this long before it can be borrowed
borrow_hysteresis_frames = 15     # delay before handing a borrowed channel back

# duty: 0.125 / 0.25 / 0.5 / 0.75 are the only values the real chip supports
[pulse1]                          # lead
duty = 0.5
volume = 12
attack_frames = 0
decay_frames = 4
sustain = 0.8
release_frames = 3

[pulse2]                          # harmony
duty = 0.25
volume = 8
attack_frames = 0
decay_frames = 6
sustain = 0.7
release_frames = 4

[triangle]                        # bass. volume is fixed by hardware; see note below.
duty = 0.0
volume = 15
attack_frames = 0
decay_frames = 0
sustain = 1.0
release_frames = 0

[noise]                           # drums
duty = 0.0
volume = 10
attack_frames = 0
decay_frames = 2
sustain = 0.0
release_frames = 1

# priority: when two hits land on the same frame the higher priority wins the one
# noise channel. A lost kick is heard; a lost hi-hat is not - hence kick > snare > hat.
[drums.kick]
period_index = 10                 # index into the 16-entry NTSC noise period table
mode = "long"
volume = 13
frames = 4
priority = 3

[drums.snare]
period_index = 6
mode = "long"
volume = 12
frames = 6
priority = 2

[drums.hat]
period_index = 2
mode = "long"
volume = 6
frames = 2
priority = 1

# Relative channel trim applied before the non-linear mixer.
[levels]
pulse1 = 1.0
pulse2 = 0.85
triangle = 1.0
noise = 0.7

# Audio -> Score analysis taste knobs (Demucs separation, transcription, drum
# classification). Nothing tasteful is hardcoded in Python here either.
[analysis]
include_vocals   = true    # false -> instrumental cover, lead taken from `other`
vocal_fmin       = 80.0    # librosa.pyin search floor (Hz)
vocal_fmax       = 1000.0
min_note_seconds = 0.033   # drop transcribed notes shorter than this (seconds)
kick_max_hz      = 150.0   # spectral centroid below this -> kick
hat_min_hz       = 6000.0  # spectral centroid above this -> hat; between -> snare
onset_backtrack  = true    # librosa onset backtracking to the local energy minimum
harmony_declash  = true    # push a harmony note down an octave when it collides with the lead
declash_semitones = 1      # "collides" = within this many semitones of a concurrent lead note
