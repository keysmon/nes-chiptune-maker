# Full resolved dependency set for reproducible waveform output (`.venv/bin/pip freeze
# --all --exclude-editable` on arm64 macOS, Python 3.11). Later tasks assert exact sample
# values, so drift in any transitive dependency (numpy, torch, resampy, ...) is a real bug
# risk, not noise.
# `--all` is required, not cosmetic: plain `pip freeze` silently omits setuptools, and
# setuptools<81 is the one pin this whole stack depends on (see constraints.txt).
# `--exclude-editable` is required, not cosmetic: without it, this file would contain an
# `-e /abs/path/to/this/checkout` line pinned to whoever generated the lockfile's machine,
# which breaks `pip install -r requirements.lock` on any other clone. The local package
# itself is installed separately below, not tracked here.
# Regenerate after any dependency change:
#   .venv/bin/pip freeze --all --exclude-editable > requirements.lock
# Reinstall exactly on a fresh clone:
#   pip install -r requirements.lock -c constraints.txt
#   pip install -e . --no-deps
